name: paramingle-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paramingle}
      POSTGRES_USER: ${POSTGRES_USER:-paramingle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paramingle_local_only}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - paramingle-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - paramingle-redis:/data

volumes:
  paramingle-postgres:
  paramingle-redis:
