services:
  - type: web
    name: paramingle-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm ci && npm run build:api
    startCommand: npm start
    healthCheckPath: /health/ready
    autoDeployTrigger: off
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: paramingle-realtime
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_ISSUER
        sync: false
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: avatars
      - key: SUPABASE_PRIVACY_EXPORT_BUCKET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CURRENT_TERMS_VERSION
        sync: false
      - key: CURRENT_PRIVACY_VERSION
        sync: false
      - key: CURRENT_GUIDELINES_VERSION
        sync: false
      - key: BIRTH_DATE_KEY_ID
        sync: false
      - key: BIRTH_DATE_ENCRYPTION_KEY
        sync: false
      - key: TURN_URLS
        sync: false
      - key: TURN_CREDENTIAL_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: TURNSTILE_ALLOWED_HOSTNAMES
        sync: false
      - key: DEPLOYMENT_ENVIRONMENT
        sync: false
      - key: OPENAPI_ENABLED
        value: "false"
      - key: WEB_ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_ALLOWED_ORIGINS
        sync: false
      - key: PREVIEW_ALLOWED_ORIGINS
        sync: false
      - key: GLOBAL_CONCURRENCY_CEILING
        sync: false
      - key: COUNTRY_CONCURRENCY_CEILINGS
        sync: false

  - type: cron
    name: paramingle-maintenance
    runtime: node
    region: singapore
    plan: starter
    schedule: "0 * * * *"
    buildCommand: npm ci && npm run build:worker
    startCommand: npm run worker:once
    autoDeployTrigger: off
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: paramingle-realtime
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_ISSUER
        sync: false
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: avatars
      - key: SUPABASE_PRIVACY_EXPORT_BUCKET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CURRENT_TERMS_VERSION
        sync: false
      - key: CURRENT_PRIVACY_VERSION
        sync: false
      - key: CURRENT_GUIDELINES_VERSION
        sync: false
      - key: BIRTH_DATE_KEY_ID
        sync: false
      - key: BIRTH_DATE_ENCRYPTION_KEY
        sync: false
      - key: TURN_URLS
        sync: false
      - key: TURN_CREDENTIAL_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: TURNSTILE_ALLOWED_HOSTNAMES
        sync: false
      - key: DEPLOYMENT_ENVIRONMENT
        sync: false
      - key: OPENAPI_ENABLED
        value: "false"
      - key: WEB_ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_ALLOWED_ORIGINS
        sync: false
      - key: GLOBAL_CONCURRENCY_CEILING
        sync: false
      - key: COUNTRY_CONCURRENCY_CEILINGS
        sync: false

  - type: keyvalue
    name: paramingle-realtime
    region: singapore
    plan: free
    ipAllowList: []
